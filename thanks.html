<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Thank You!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><span class="brand-dot"></span> QuizLab</a>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="results.html" class="admin-btn">🔒 Admin</a>
    <button class="home-btn" onclick="window.location.href='index.html'">← Home</button>
    <div class="steps">
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step done"></div>
      <div class="step done"></div>
    </div>
  </div>
</div>

<div class="page" id="app"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  if (!requireLogin()) throw new Error('redirect');

  const user      = getCurrentUser();
  const app       = document.getElementById('app');
  const firstName = user ? user.name.split(' ')[0] : 'there';

  app.innerHTML = `
    <div class="tc fu" style="padding:16px 0 4px;">
      <div class="confetti-wrap pop">🎉🎊✨</div>
      <h1 style="margin-top:10px;">Thank you, ${firstName}!</h1>
      <p class="sub" style="margin-top:10px;max-width:340px;margin-inline:auto;">
        You've completed both sections. Your responses have been recorded — we'll be in touch!
      </p>
    </div>

    <div class="card fu1 tc">
      <div style="font-size:2rem;margin-bottom:10px;">👏</div>
      <h3>All done!</h3>
      <p class="sub" style="font-size:0.9rem;margin-top:8px;">
        Feel free to close this tab. Your responses have been saved.
      </p>
      <button onclick="window.location.href='index.html'"
        class="btn btn-ghost" style="margin-top:20px;width:100%;">
        ← Back to Home
      </button>
    </div>
  `;
</script>
</body>
</html>
