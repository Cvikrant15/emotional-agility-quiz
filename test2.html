<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Test 2</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .fc-card {
      flex: 1;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .fc-card:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(108,92,231,0.15);
    }
    .fc-label {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text);
      user-select: none;
      text-align: center;
      padding: 0 12px;
      line-height: 1.3;
    }
    .fc-chosen {
      border-color: var(--accent) !important;
      background: var(--accent-light) !important;
      transform: translateY(-4px) scale(1.03) !important;
      box-shadow: 0 8px 24px rgba(108,92,231,0.18);
    }
    .fc-chosen .fc-label { color: var(--accent); }
    .fc-unchosen { opacity: 0.4; }
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="brand" href="index.html"><span class="brand-mark">QL</span> QuizLab</a>
    <button class="home-btn" id="homeBtn" onclick="goHome()">← Home</button>
  </div>
  <div class="steps">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>
</div>

<div class="page" id="app"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  if (!requireLogin()) throw new Error('redirect');

  const user = getCurrentUser();
  if (user && !user.test1) { window.location.replace('test1.html'); throw new Error('redirect'); }
  if (user && user.test2)  { window.location.replace(user.test3 ? 'thanks.html' : 'test3.html'); throw new Error('redirect'); }

  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));

  let testComplete = false;

  function goHome() {
    if (testComplete) { window.location.href = 'index.html'; return; }
    if (confirm('Leave the test? Your progress will be lost and you\'ll need to start over.')) {
      window.location.href = 'index.html';
    }
  }

  const app = document.getElementById('app');

  const allAnswers   = [];   // accumulates all answers across all rounds
  let currentRounds  = THIS_OR_THAT;
  let idx            = 0;
  let roundOffset    = 0;    // total rounds completed before the current batch
  let tiebreakerNum  = 0;

  function render() {
    if (idx >= currentRounds.length) { handleRoundsComplete(); return; }

    const q          = currentRounds[idx];
    const globalNum  = roundOffset + idx + 1;
    const pct        = Math.round((idx / currentRounds.length) * 100);

    app.innerHTML = `
      <div class="progress-wrap fu w100">
        <div class="progress-meta">
          <span>Round ${globalNum} <span class="muted">of ${roundOffset + currentRounds.length}</span></span>
          <span class="muted">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="card fu1">
        <p style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:24px;text-align:center;">
          Test 2 &nbsp;·&nbsp; Pick one
        </p>

        <div style="display:flex;align-items:center;gap:16px;">
          <button class="fc-card side-a" onclick="pick('a')">
            <span class="fc-label">${ITEMS[q.a] || q.a.toUpperCase()}</span>
          </button>
          <div style="flex-shrink:0;font-size:0.72rem;font-weight:800;color:var(--muted);letter-spacing:.06em;">VS</div>
          <button class="fc-card side-b" onclick="pick('b')">
            <span class="fc-label">${ITEMS[q.b] || q.b.toUpperCase()}</span>
          </button>
        </div>

        <p class="sub" style="text-align:center;font-size:0.84rem;margin-top:22px;">
          Which do you prefer? Tap a card to choose.
        </p>
      </div>

      ${tiebreakerNum === 0 ? `
        <div style="text-align:center;">
          <button class="btn btn-ghost" onclick="skipAll()" style="font-size:0.82rem;padding:8px 22px;color:var(--muted);">
            Skip this section
          </button>
        </div>
      ` : ''}
    `;
  }

  function handleRoundsComplete() {
    const tied = getTiedAtCutoff(allAnswers);
    if (tied) {
      tiebreakerNum++;
      roundOffset   += currentRounds.length;
      currentRounds  = roundRobinPairs(tied, `tb${tiebreakerNum}`);
      idx            = 0;
      render();
    } else {
      showSummary();
    }
  }

  function pick(side) {
    const q = currentRounds[idx];
    allAnswers.push({ questionId: q.id, a: q.a, b: q.b, chosen: side });

    const cardA = document.querySelector('.side-a');
    const cardB = document.querySelector('.side-b');
    cardA.disabled = true;
    cardB.disabled = true;

    const chosen   = side === 'a' ? cardA : cardB;
    const unchosen = side === 'a' ? cardB : cardA;
    chosen.classList.add('fc-chosen');
    unchosen.classList.add('fc-unchosen');

    setTimeout(() => { idx++; render(); }, 500);
  }

  function skipAll() {
    if (!confirm('Skip this entire section? Your answers so far won\'t be saved.')) return;
    saveTest2([], true);
    window.location.href = 'thanks.html';
  }

  function showSummary() {
    testComplete = true;
    saveTest2(allAnswers);
    app.innerHTML = `
      <div class="tc fu" style="padding:24px 0 4px;">
        <div style="font-size:3rem;margin-bottom:14px;">✅</div>
        <h1>Section 2 complete!</h1>
        <p class="sub" style="margin-top:10px;max-width:320px;margin-inline:auto;">
          Almost there — just one more step.
        </p>
      </div>
      <div class="fu1 w100">
        <a href="test3.html" class="btn btn-primary btn-full">Continue &nbsp;→</a>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
