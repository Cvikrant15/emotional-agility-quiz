<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Test 2</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .fc-card {
      flex: 1;
      aspect-ratio: 3/4;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .fc-card:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(108,92,231,0.15);
    }
    .fc-label {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--text);
      user-select: none;
    }
    .fc-chosen {
      border-color: var(--accent) !important;
      background: var(--accent-light) !important;
      transform: translateY(-4px) scale(1.03) !important;
      box-shadow: 0 8px 24px rgba(108,92,231,0.18);
    }
    .fc-chosen .fc-label { color: var(--accent); }
    .fc-unchosen { opacity: 0.4; }

    .tb-banner {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,193,7,0.12);
      border: 1.5px solid rgba(255,193,7,0.4);
      color: #b8860b;
      border-radius: 99px;
      padding: 4px 14px;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="brand" href="index.html"><span class="brand-mark">QL</span> QuizLab</a>
    <button class="home-btn" id="homeBtn" onclick="goHome()">← Home</button>
  </div>
  <div class="steps">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
  </div>
</div>

<div class="page" id="app"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  if (!requireLogin()) throw new Error('redirect');

  const user = getCurrentUser();

  if (user && !user.test1) {
    window.location.replace('test1.html');
    throw new Error('redirect');
  }
  if (user && user.test2) {
    window.location.replace('thanks.html');
    throw new Error('redirect');
  }

  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => history.pushState(null, '', location.href));

  let testComplete = false;

  function goHome() {
    if (testComplete) { window.location.href = 'index.html'; return; }
    if (confirm('Leave the test? Your progress will be lost and you\'ll need to start over.')) {
      window.location.href = 'index.html';
    }
  }

  const app = document.getElementById('app');

  // All answers accumulated across main + tiebreaker rounds
  const allAnswers = [];

  // Current active round list and position
  let currentRounds = THIS_OR_THAT;
  let idx = 0;
  let tiebreakerNum = 0; // 0 = main rounds, 1+ = tiebreaker number

  // ── Render a flashcard round ──
  function render() {
    if (idx >= currentRounds.length) {
      handleRoundsComplete();
      return;
    }

    const q        = currentRounds[idx];
    const total    = currentRounds.length;
    const pct      = Math.round((idx / total) * 100);
    const isTb     = tiebreakerNum > 0;
    const roundLabel = isTb
      ? `Tiebreaker${tiebreakerNum > 1 ? ' ' + tiebreakerNum : ''} · Round ${idx + 1} of ${total}`
      : `Round ${idx + 1} of ${total}`;

    app.innerHTML = `
      <div class="progress-wrap fu w100">
        <div class="progress-meta">
          <span>${roundLabel}</span>
          <span class="muted">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="card fu1">
        <div style="text-align:center;margin-bottom:20px;">
          ${isTb
            ? `<span class="tb-banner">⚖️ Tiebreaker${tiebreakerNum > 1 ? ' ' + tiebreakerNum : ''}</span>`
            : `<p style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Test 2 · Pick one</p>`
          }
        </div>

        <div style="display:flex;align-items:center;gap:16px;">
          <button class="fc-card side-a" onclick="pick('a')">
            <span class="fc-label">${q.a.toUpperCase()}</span>
          </button>
          <div style="flex-shrink:0;font-size:0.72rem;font-weight:800;color:var(--muted);letter-spacing:.06em;">VS</div>
          <button class="fc-card side-b" onclick="pick('b')">
            <span class="fc-label">${q.b.toUpperCase()}</span>
          </button>
        </div>

        <p class="sub" style="text-align:center;font-size:0.84rem;margin-top:22px;">
          ${isTb ? 'These options tied — pick your preference to break the tie.' : 'Which do you prefer? Tap a card to choose.'}
        </p>
      </div>

      ${tiebreakerNum === 0 ? `
        <div style="text-align:center;">
          <button class="btn btn-ghost" onclick="skipAll()" style="font-size:0.82rem;padding:8px 22px;color:var(--muted);">
            Skip this section
          </button>
        </div>
      ` : ''}
    `;
  }

  // ── After a set of rounds finishes, check for a tie ──
  function handleRoundsComplete() {
    const tied = getTiedAtCutoff(allAnswers);
    if (tied) {
      tiebreakerNum++;
      currentRounds = roundRobinPairs(tied, `tb${tiebreakerNum}`);
      idx = 0;
      showTiebreakerIntro(tied);
    } else {
      showSummary();
    }
  }

  // ── Tiebreaker intro screen ──
  function showTiebreakerIntro(tied) {
    const letters = tied.map(l => `<strong>${l.toUpperCase()}</strong>`).join(', ');
    const pairCount = (tied.length * (tied.length - 1)) / 2;
    app.innerHTML = `
      <div class="card fu tc" style="max-width:400px;margin:0 auto;">
        <div style="font-size:2.8rem;margin-bottom:14px;">⚖️</div>
        <h2 style="margin-bottom:10px;">It's a tie!</h2>
        <p class="sub" style="font-size:0.9rem;line-height:1.6;margin-bottom:6px;">
          Options ${letters} are level at the cut-off.
        </p>
        <p class="sub" style="font-size:0.86rem;line-height:1.6;margin-bottom:28px;">
          ${pairCount} quick tiebreaker round${pairCount !== 1 ? 's' : ''} coming up — just the tied options head to head.
        </p>
        <button class="btn btn-primary btn-full" onclick="render()">Let's go &nbsp;→</button>
      </div>
    `;
  }

  // ── Pick a card ──
  function pick(side) {
    const q = currentRounds[idx];
    allAnswers.push({ questionId: q.id, a: q.a, b: q.b, chosen: side });

    const cardA = document.querySelector('.side-a');
    const cardB = document.querySelector('.side-b');
    cardA.disabled = true;
    cardB.disabled = true;

    const chosen   = side === 'a' ? cardA : cardB;
    const unchosen = side === 'a' ? cardB : cardA;
    chosen.classList.add('fc-chosen');
    unchosen.classList.add('fc-unchosen');

    setTimeout(() => { idx++; render(); }, 500);
  }

  // ── Skip entire test ──
  function skipAll() {
    if (!confirm('Skip this entire section? Your answers so far won\'t be saved.')) return;
    saveTest2([], true);
    window.location.href = 'thanks.html';
  }

  // ── Completion screen ──
  function showSummary() {
    testComplete = true;
    saveTest2(allAnswers);

    app.innerHTML = `
      <div class="tc fu" style="padding:24px 0 4px;">
        <div style="font-size:3rem;margin-bottom:14px;">✅</div>
        <h1>Section 2 complete!</h1>
        <p class="sub" style="margin-top:10px;max-width:320px;margin-inline:auto;">
          Almost there — just one more step.
        </p>
      </div>
      <div class="fu1 w100">
        <a href="thanks.html" class="btn btn-primary btn-full">Continue &nbsp;→</a>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
