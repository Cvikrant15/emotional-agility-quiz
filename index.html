<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Let's Begin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="brand" href="index.html"><span class="brand-mark">QL</span> QuizLab</a>
    <a href="results.html" class="admin-btn">Admin</a>
  </div>
  <div class="steps">
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>
</div>

<div class="page">

  <div class="tc fu" style="padding: 12px 0 4px;">
    <div style="font-size: 3.2rem; margin-bottom: 14px;">👋</div>
    <h1>Good to see you!</h1>
    <p class="sub" style="margin-top: 10px; max-width: 340px; margin-inline: auto;">
      Tell us who you are and we'll get the quiz started. Just 2 quick tests — no stress.
    </p>
  </div>

  <div class="card fu1">
    <form id="form" class="fields">
      <div class="field">
        <label for="name">Your name</label>
        <input type="text" id="name" placeholder="e.g. Alex Johnson" required autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="e.g. alex@example.com" required autocomplete="email">
      </div>
      <p id="err" class="text-err hidden"></p>
      <button type="submit" class="btn btn-primary btn-full mt-2">
        Let's go &nbsp;→
      </button>
    </form>
  </div>


</div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  const existing = getCurrentUser();
  if (existing) {
    document.getElementById('name').value = existing.name;
    document.getElementById('email').value = existing.email;
  }

  document.getElementById('form').addEventListener('submit', function (e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const err = document.getElementById('err');

    if (name.length < 2) {
      err.textContent = 'Please enter your full name.';
      err.classList.remove('hidden');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      err.textContent = 'Please enter a valid email address.';
      err.classList.remove('hidden');
      return;
    }

    loginUser(name, email);
    window.location.href = 'test1.html';
  });
</script>
</body>
</html>
