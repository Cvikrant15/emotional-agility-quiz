<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Test 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <span class="brand"><span class="brand-dot"></span> QuizLab</span>
  <div style="display:flex;align-items:center;gap:0;">
    <button class="home-btn" id="homeBtn" onclick="goHome()">← Home</button>
    <div class="steps">
      <div class="step done"></div>
      <div class="step active"></div>
      <div class="step"></div>
      <div class="step"></div>
    </div>
  </div>
</div>

<div class="page" id="app"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  if (!requireLogin()) throw new Error('redirect');

  const user = getCurrentUser();

  // Already finished test 1 — skip forward
  if (user && user.test1) {
    window.location.replace(user.test2 ? 'thanks.html' : 'test2.html');
    throw new Error('redirect');
  }

  // Lock browser back button
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function () {
    history.pushState(null, '', location.href);
  });

  let testComplete = false;

  function goHome() {
    if (testComplete) { window.location.href = 'index.html'; return; }
    if (confirm('Leave the test? Your progress will be lost and you\'ll need to start over.')) {
      window.location.href = 'index.html';
    }
  }

  const app = document.getElementById('app');
  // No shuffle — these statements are shown in fixed order
  const questions = [...MCQ_QUESTIONS];
  let idx = 0;
  const answers = [];

  function render() {
    if (idx >= questions.length) { showSummary(); return; }

    const q   = questions[idx];
    const pct = Math.round((idx / questions.length) * 100);

    app.innerHTML = `
      <div class="progress-wrap fu w100">
        <div class="progress-meta">
          <span>Statement ${idx + 1} <span class="muted">of ${questions.length}</span></span>
          <span class="muted">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="card fu1">
        <p style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:20px;">
          Test 1 &nbsp;·&nbsp; About Me
        </p>

        <h2 style="line-height:1.55;margin-bottom:32px;font-size:1.2rem;font-weight:600;">
          "${q.question}"
        </h2>

        <div class="yn-grid">
          <button class="yn-btn yn-yes" onclick="pick('yes')">Yes</button>
          <button class="yn-btn yn-no"  onclick="pick('no')">No</button>
        </div>

        <p class="sub" style="text-align:center;font-size:0.84rem;margin-top:18px;">
          There are no right or wrong answers — just be honest 💙
        </p>
      </div>
    `;
  }

  function pick(choice) {
    const q = questions[idx];
    answers.push({ questionId: q.id, question: q.question, chosen: choice });

    const btnYes = document.querySelector('.yn-yes');
    const btnNo  = document.querySelector('.yn-no');
    btnYes.disabled = true;
    btnNo.disabled  = true;

    const chosen = choice === 'yes' ? btnYes : btnNo;
    chosen.classList.add('chosen');
    chosen.style.transform = 'translateY(-3px) scale(1.03)';

    setTimeout(() => { idx++; render(); }, 420);
  }

  function showSummary() {
    testComplete = true;
    saveTest1(answers);

    const yesCount = answers.filter(a => a.chosen === 'yes').length;
    const noCount  = answers.length - yesCount;

    app.innerHTML = `
      <div class="tc fu" style="padding:12px 0 4px;">
        <div style="font-size:3rem;margin-bottom:12px;">✅</div>
        <h1>Test 1 done!</h1>
        <p class="sub" style="margin-top:8px;">Thanks for being honest. Here's a quick look at your responses.</p>
      </div>

      <div class="fu1 w100" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="card tc" style="padding:24px 16px;">
          <div style="font-size:2.2rem;font-weight:800;color:var(--success);letter-spacing:-0.04em;">${yesCount}</div>
          <div class="sub" style="font-size:0.82rem;margin-top:4px;">Yes</div>
        </div>
        <div class="card tc" style="padding:24px 16px;">
          <div style="font-size:2.2rem;font-weight:800;color:var(--danger);letter-spacing:-0.04em;">${noCount}</div>
          <div class="sub" style="font-size:0.82rem;margin-top:4px;">No</div>
        </div>
      </div>

      <div class="card fu2">
        <h3 style="margin-bottom:18px;">Your responses</h3>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${answers.map((a, n) => `
            <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--bg);border-radius:10px;
              border-left:3px solid ${a.chosen === 'yes' ? 'var(--success)' : 'var(--danger)'};">
              <span style="font-size:0.75rem;font-weight:700;color:var(--muted);min-width:22px;padding-top:2px;">${n + 1}</span>
              <span style="flex:1;font-size:0.9rem;line-height:1.5;">${a.question}</span>
              <span style="font-size:0.82rem;font-weight:800;color:${a.chosen === 'yes' ? 'var(--success)' : 'var(--danger)'};flex-shrink:0;padding-top:2px;">
                ${a.chosen === 'yes' ? 'Yes' : 'No'}
              </span>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="fu3 w100">
        <a href="test2.html" class="btn btn-primary btn-full">Continue to Test 2 &nbsp;→</a>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
