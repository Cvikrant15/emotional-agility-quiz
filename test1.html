<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Test 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a class="brand" href="index.html"><span class="brand-mark">QL</span> QuizLab</a>
    <button class="home-btn" id="homeBtn" onclick="goHome()">← Home</button>
  </div>
  <div class="steps">
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>
</div>

<div class="page" id="app"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  if (!requireLogin()) throw new Error('redirect');

  const user = getCurrentUser();

  // Already finished test 1 — skip forward
  if (user && user.test1) {
    if      (!user.test2) window.location.replace('test2.html');
    else if (!user.test3) window.location.replace('test3.html');
    else                  window.location.replace('thanks.html');
    throw new Error('redirect');
  }

  // Lock browser back button
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', function () {
    history.pushState(null, '', location.href);
  });

  let testComplete = false;

  function goHome() {
    if (testComplete) { window.location.href = 'index.html'; return; }
    if (confirm('Leave the test? Your progress will be lost and you\'ll need to start over.')) {
      window.location.href = 'index.html';
    }
  }

  const app = document.getElementById('app');
  // No shuffle — these statements are shown in fixed order
  const questions = [...MCQ_QUESTIONS];
  let idx = 0;
  const answers = [];

  function render() {
    if (idx >= questions.length) { showSummary(); return; }

    const q   = questions[idx];
    const pct = Math.round((idx / questions.length) * 100);

    app.innerHTML = `
      <div class="progress-wrap fu w100">
        <div class="progress-meta">
          <span>Statement ${idx + 1} <span class="muted">of ${questions.length}</span></span>
          <span class="muted">${pct}%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      <div class="card fu1">
        <p style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:20px;">
          Test 1 &nbsp;·&nbsp; About Me
        </p>

        <h2 style="line-height:1.55;margin-bottom:32px;font-size:1.2rem;font-weight:600;">
          "${q.question}"
        </h2>

        <div class="yn-grid">
          <button class="yn-btn yn-yes" onclick="pick('yes')">Yes</button>
          <button class="yn-btn yn-no"  onclick="pick('no')">No</button>
        </div>

        <p class="sub" style="text-align:center;font-size:0.84rem;margin-top:18px;">
          There are no right or wrong answers — just be honest 💙
        </p>
      </div>
    `;
  }

  function pick(choice) {
    const q = questions[idx];
    answers.push({ questionId: q.id, question: q.question, chosen: choice });

    const btnYes = document.querySelector('.yn-yes');
    const btnNo  = document.querySelector('.yn-no');
    btnYes.disabled = true;
    btnNo.disabled  = true;

    const chosen = choice === 'yes' ? btnYes : btnNo;
    chosen.classList.add('chosen');
    chosen.style.transform = 'translateY(-3px) scale(1.03)';

    setTimeout(() => { idx++; render(); }, 420);
  }

  function showSummary() {
    testComplete = true;
    saveTest1(answers);

    app.innerHTML = `
      <div class="tc fu" style="padding:24px 0 4px;">
        <div style="font-size:3rem;margin-bottom:14px;">✅</div>
        <h1>Section 1 complete!</h1>
        <p class="sub" style="margin-top:10px;max-width:320px;margin-inline:auto;">
          Great work — let's move on to the next part.
        </p>
      </div>
      <div class="fu1 w100">
        <a href="test2.html" class="btn btn-primary btn-full">Continue &nbsp;→</a>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
