<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Admin Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <span class="brand"><span class="brand-dot"></span> QuizLab</span>
  <span style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Admin</span>
</div>

<!-- Gate -->
<div class="page" id="gate">
  <div class="tc fu" style="padding: 16px 0 4px;">
    <div style="font-size: 2.8rem; margin-bottom: 14px;">🔒</div>
    <h1>Admin Access</h1>
    <p class="sub" style="margin-top: 10px;">This page is for administrators only.</p>
  </div>
  <div class="card fu1">
    <form id="gateForm" class="fields">
      <div class="field">
        <label for="pw">Password</label>
        <input type="password" id="pw" placeholder="Enter admin password" autocomplete="current-password">
      </div>
      <p id="gateErr" class="text-err hidden">Incorrect password. Try again.</p>
      <button type="submit" class="btn btn-primary btn-full mt-2">Unlock Results</button>
    </form>
  </div>
</div>

<!-- Dashboard (hidden until unlocked) -->
<div class="page wide hidden" id="dashboard"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  const ADMIN_PASSWORD = 'quizlab2024';

  const COLORS = ['#6c5ce7','#00cec9','#fd79a8','#e17055','#00b894','#0984e3','#a29bfe','#fdcb6e'];

  function avatarColor(email) {
    let h = 0;
    for (let i = 0; i < email.length; i++) h = email.charCodeAt(i) + ((h << 5) - h);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  document.getElementById('gateForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const val = document.getElementById('pw').value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      renderDashboard();
    } else {
      document.getElementById('gateErr').classList.remove('hidden');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  function renderDashboard() {
    const store = getStore();
    const users = store.users || [];
    const dash = document.getElementById('dashboard');

    const t1Done = users.filter(u => u.test1).length;
    const t2Done = users.filter(u => u.test2).length;
    const avgScore = t1Done
      ? Math.round(users.filter(u => u.test1).reduce((s, u) => s + (u.test1.score / u.test1.total) * 100, 0) / t1Done)
      : 0;

    dash.innerHTML = `
      <div class="fu w100" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 0 8px;">
        <div>
          <h1 style="font-size:1.6rem;">Results Dashboard</h1>
          <p class="sub" style="font-size:0.85rem;margin-top:3px;">All participants recorded in this browser</p>
        </div>
        <button class="btn btn-ghost" onclick="exportCSV()" style="font-size:0.85rem;padding:10px 18px;">
          ↓ Export CSV
        </button>
      </div>

      <div class="stat-row fu1">
        <div class="stat-box">
          <div class="stat-num">${users.length}</div>
          <div class="stat-label">Participants</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--accent);">${t1Done}</div>
          <div class="stat-label">MCQ done</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--accent2);">${t2Done}</div>
          <div class="stat-label">This or That done</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--success);">${avgScore}%</div>
          <div class="stat-label">Avg MCQ score</div>
        </div>
      </div>

      ${users.length === 0 ? `
        <div class="card fu2 tc">
          <div style="font-size:2.5rem;margin-bottom:12px;">📭</div>
          <h3>No participants yet</h3>
          <p class="sub" style="margin-top:6px;font-size:0.88rem;">Participants will appear here once they complete the login.</p>
        </div>
      ` : `
        <div class="card fu2" style="width:100%;">
          <h3 style="margin-bottom:18px;">All Participants</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>MCQ Score</th>
                  <th>MCQ</th>
                  <th>This or That</th>
                  <th>Joined</th>
                </tr>
              </thead>
              <tbody>
                ${users.map(u => {
                  const t1 = u.test1;
                  const t2 = u.test2;
                  const sp = t1 ? Math.round((t1.score / t1.total) * 100) : null;
                  const color = avatarColor(u.email);
                  return `
                    <tr>
                      <td>
                        <div style="display:flex;align-items:center;">
                          <span class="avatar" style="background:${color};">${initials(u.name)}</span>
                          <span style="font-weight:600;">${u.name}</span>
                        </div>
                      </td>
                      <td style="color:var(--muted);font-size:0.85rem;">${u.email}</td>
                      <td>
                        ${t1 ? `
                          <div class="bar-inline">
                            <span style="font-weight:700;min-width:36px;font-size:0.9rem;">${t1.score}/${t1.total}</span>
                            <div class="mini-bar"><div class="mini-fill" style="width:${sp}%;"></div></div>
                            <span style="font-size:0.82rem;color:var(--muted);min-width:32px;">${sp}%</span>
                          </div>
                        ` : '<span style="color:var(--muted);">—</span>'}
                      </td>
                      <td><span class="chip ${t1 ? 'chip-done' : 'chip-skip'}">${t1 ? 'Done' : 'Pending'}</span></td>
                      <td><span class="chip ${t2 ? 'chip-done' : 'chip-skip'}">${t2 ? 'Done' : 'Pending'}</span></td>
                      <td style="color:var(--muted);font-size:0.85rem;">${fmtDate(u.joinedAt)}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        ${users.filter(u => u.test2).length > 0 ? `
          <div class="card fu3" style="width:100%;">
            <h3 style="margin-bottom:6px;">This or That — Group Preferences</h3>
            <p class="sub" style="font-size:0.85rem;margin-bottom:22px;">How everyone voted across all ${THIS_OR_THAT.length} questions</p>
            <div style="display:flex;flex-direction:column;gap:16px;">
              ${THIS_OR_THAT.map(q => {
                const all = users.flatMap(u => u.test2 ? u.test2.answers : []);
                const qa = all.filter(a => a.questionId === q.id);
                const av = qa.filter(a => a.chosen === 'a').length;
                const bv = qa.filter(a => a.chosen === 'b').length;
                const tot = av + bv;
                if (!tot) return '';
                const ap = Math.round((av / tot) * 100);
                const bp = 100 - ap;
                return `
                  <div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:7px;font-size:0.88rem;">
                      <span style="font-weight:${ap >= bp ? 700 : 400};color:${ap >= bp ? 'var(--accent)' : 'var(--muted)'};">${q.a} <span style="font-size:0.78rem;">(${ap}%)</span></span>
                      <span style="font-weight:${bp > ap ? 700 : 400};color:${bp > ap ? 'var(--accent2)' : 'var(--muted)'};">${q.b} <span style="font-size:0.78rem;">(${bp}%)</span></span>
                    </div>
                    <div style="height:9px;border-radius:99px;overflow:hidden;display:flex;">
                      <div style="width:${ap}%;background:var(--accent);transition:width .6s ease;"></div>
                      <div style="flex:1;background:var(--accent2);"></div>
                    </div>
                  </div>
                `;
              }).filter(Boolean).join('')}
            </div>
          </div>
        ` : ''}

        <div class="fu3" style="width:100%;display:flex;gap:12px;">
          <button class="btn btn-ghost" style="flex:1;color:var(--danger);border-color:var(--danger);" onclick="clearAll()">
            Clear all data
          </button>
        </div>
      `}
    `;
  }

  function clearAll() {
    if (!confirm('Delete ALL participant data? This cannot be undone.')) return;
    localStorage.removeItem('quizlab_v2');
    renderDashboard();
  }

  function exportCSV() {
    const users = getStore().users || [];
    const rows = [['Name', 'Email', 'MCQ Score', 'MCQ %', 'This or That Done', 'Joined']];
    users.forEach(u => {
      const t1 = u.test1;
      const t2 = u.test2;
      rows.push([
        u.name,
        u.email,
        t1 ? `${t1.score}/${t1.total}` : '',
        t1 ? Math.round((t1.score / t1.total) * 100) + '%' : '',
        t2 ? 'Yes' : 'No',
        fmtDate(u.joinedAt)
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'quizlab-results.csv';
    a.click();
  }
</script>
</body>
</html>
