<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizLab — Admin Results</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html"><span class="brand-dot"></span> QuizLab</a>
  <span id="adminLabel" style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;"></span>
</div>

<!-- ── Login gate ── -->
<div class="page" id="gate">
  <div class="tc fu" style="padding:16px 0 4px;">
    <div style="font-size:2.8rem;margin-bottom:14px;">🔒</div>
    <h1>Admin Access</h1>
    <p class="sub" style="margin-top:10px;">This page is for administrators only.</p>
  </div>

  <div class="card fu1">
    <form id="gateForm" class="fields">
      <div class="field">
        <label for="un">Username</label>
        <input type="text" id="un" placeholder="admin1 or admin2" autocomplete="username" spellcheck="false">
      </div>
      <div class="field">
        <label for="pw">Password</label>
        <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password">
      </div>
      <p id="gateErr" class="text-err hidden" style="margin-top:2px;">Incorrect username or password.</p>
      <button type="submit" class="btn btn-primary btn-full mt-2">Unlock Results</button>
    </form>
  </div>
</div>

<!-- ── Dashboard (hidden until unlocked) ── -->
<div class="page wide hidden" id="dashboard"></div>

<script src="data.js"></script>
<script src="seed.js"></script>
<script src="store.js"></script>
<script>
  const ADMINS = {
    admin1: 'QuizAdmin1!',
    admin2: 'QuizAdmin2!'
  };

  const COLORS = ['#6c5ce7','#00cec9','#fd79a8','#e17055','#00b894','#0984e3','#a29bfe','#fdcb6e'];

  let currentAdmin = null;

  function avatarColor(email) {
    let h = 0;
    for (let i = 0; i < email.length; i++) h = email.charCodeAt(i) + ((h << 5) - h);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function eaLabel(yesCount) {
    if (yesCount >= 10) return { text: 'High emotional agility',      color: '#00b894' };
    if (yesCount >= 8)  return { text: 'Strong emotional agility',    color: '#6c5ce7' };
    if (yesCount >= 6)  return { text: 'Moderate emotional agility',  color: '#00cec9' };
    if (yesCount >= 4)  return { text: 'Developing emotional agility',color: '#e17055' };
    return               { text: 'Early emotional agility',           color: '#e55353' };
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── Gate form ──
  document.getElementById('gateForm').addEventListener('submit', function (e) {
    e.preventDefault();
    const un  = document.getElementById('un').value.trim().toLowerCase();
    const pw  = document.getElementById('pw').value;
    const err = document.getElementById('gateErr');

    if (ADMINS[un] && ADMINS[un] === pw) {
      currentAdmin = un;
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('adminLabel').textContent = `Logged in as ${un}`;
      renderDashboard();
    } else {
      err.classList.remove('hidden');
      document.getElementById('pw').value = '';
      document.getElementById('pw').focus();
    }
  });

  // ── Dashboard ──
  function renderDashboard() {
    const store = getStore();
    const users = store.users || [];
    const dash  = document.getElementById('dashboard');

    const t1Done = users.filter(u => u.test1).length;
    const t2Done = users.filter(u => u.test2).length;

    dash.innerHTML = `
      <div class="fu w100" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:4px 0 8px;">
        <div>
          <h1 style="font-size:1.6rem;">Results Dashboard</h1>
          <p class="sub" style="font-size:0.85rem;margin-top:3px;">
            All participants · viewing as <strong>${currentAdmin}</strong>
          </p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-ghost" onclick="exportCSV()" style="font-size:0.85rem;padding:10px 18px;">↓ Export CSV</button>
          <button class="btn btn-ghost" onclick="logout()" style="font-size:0.85rem;padding:10px 18px;">Log out</button>
        </div>
      </div>

      <div class="stat-row fu1">
        <div class="stat-box">
          <div class="stat-num">${users.length}</div>
          <div class="stat-label">Participants</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--accent);">${t1Done}</div>
          <div class="stat-label">Test 1 done</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" style="color:var(--accent2);">${t2Done}</div>
          <div class="stat-label">Test 2 done</div>
        </div>
      </div>

      ${users.length === 0 ? `
        <div class="card fu2 tc">
          <div style="font-size:2.5rem;margin-bottom:12px;">📭</div>
          <h3>No participants yet</h3>
          <p class="sub" style="margin-top:6px;font-size:0.88rem;">Participants appear here once they log in.</p>
        </div>
      ` : `
        <div class="card fu2" style="width:100%;">
          <h3 style="margin-bottom:18px;">All Participants</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Test 1</th>
                  <th>Test 2</th>
                  <th>Joined</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${users.map(u => {
                  const t1  = u.test1;
                  const t2  = u.test2;
                  const col = avatarColor(u.email);
                  const yesCount = t1 ? t1.answers.filter(a => a.chosen === 'yes').length : null;
                  return `
                    <tr>
                      <td>
                        <div style="display:flex;align-items:center;">
                          <span class="avatar" style="background:${col};">${initials(u.name)}</span>
                          <span style="font-weight:600;">${u.name}</span>
                        </div>
                      </td>
                      <td style="color:var(--muted);font-size:0.85rem;">${u.email}</td>
                      <td>
                        ${t1 ? (() => {
                          const ea = eaLabel(yesCount);
                          return `
                            <div style="display:flex;flex-direction:column;gap:5px;">
                              <span style="font-size:0.78rem;font-weight:700;color:${ea.color};">${ea.text}</span>
                              <div class="bar-inline">
                                <span style="font-weight:700;min-width:24px;font-size:0.82rem;color:var(--success);">${yesCount}Y</span>
                                <span style="font-weight:700;min-width:24px;font-size:0.82rem;color:var(--danger);">${t1.answers.length - yesCount}N</span>
                                <div class="mini-bar"><div class="mini-fill" style="width:${Math.round((yesCount/t1.answers.length)*100)}%;background:${ea.color};"></div></div>
                              </div>
                            </div>`;
                        })() : '<span class="chip chip-skip">Pending</span>'}
                      </td>
                      <td><span class="chip ${t2 ? 'chip-done' : 'chip-skip'}">${t2 ? 'Done' : 'Pending'}</span></td>
                      <td style="color:var(--muted);font-size:0.85rem;">${fmtDate(u.joinedAt)}</td>
                      <td>
                        <button onclick="deleteUser('${u.email}')"
                          style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:4px 8px;border-radius:6px;transition:all 0.15s;"
                          onmouseover="this.style.color='var(--danger)';this.style.background='rgba(229,83,83,0.08)'"
                          onmouseout="this.style.color='var(--muted)';this.style.background='none'"
                          title="Delete this participant">✕</button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>

        ${users.filter(u => u.test1).length > 0 ? `
          <div class="card fu3" style="width:100%;">
            <h3 style="margin-bottom:6px;">Test 1 — Group Responses</h3>
            <p class="sub" style="font-size:0.85rem;margin-bottom:22px;">How the group responded to each statement</p>
            <div style="display:flex;flex-direction:column;gap:16px;">
              ${MCQ_QUESTIONS.map(q => {
                const all = users.flatMap(u => u.test1 ? u.test1.answers : []);
                const qa  = all.filter(a => a.questionId === q.id);
                const yv  = qa.filter(a => a.chosen === 'yes').length;
                const nv  = qa.filter(a => a.chosen === 'no').length;
                const tot = yv + nv;
                if (!tot) return '';
                const yp = Math.round((yv / tot) * 100);
                const np = 100 - yp;
                return `
                  <div>
                    <p style="font-size:0.88rem;font-weight:600;margin-bottom:8px;line-height:1.45;">${q.question}</p>
                    <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.82rem;">
                      <span style="font-weight:700;color:var(--success);">Yes — ${yp}%</span>
                      <span style="font-weight:700;color:var(--danger);">No — ${np}%</span>
                    </div>
                    <div style="height:9px;border-radius:99px;overflow:hidden;display:flex;">
                      <div style="width:${yp}%;background:var(--success);transition:width .6s ease;"></div>
                      <div style="flex:1;background:var(--danger);opacity:0.45;"></div>
                    </div>
                  </div>
                `;
              }).filter(Boolean).join('')}
            </div>
          </div>
        ` : ''}

        ${users.filter(u => u.test2).length > 0 ? `
          <div class="card fu3" style="width:100%;">
            <h3 style="margin-bottom:6px;">Test 2 — Group Preferences</h3>
            <p class="sub" style="font-size:0.85rem;margin-bottom:22px;">How everyone voted across all ${THIS_OR_THAT.length} questions</p>
            <div style="display:flex;flex-direction:column;gap:16px;">
              ${THIS_OR_THAT.map(q => {
                const all = users.flatMap(u => u.test2 ? u.test2.answers : []);
                const qa  = all.filter(a => a.questionId === q.id);
                const av  = qa.filter(a => a.chosen === 'a').length;
                const bv  = qa.filter(a => a.chosen === 'b').length;
                const tot = av + bv;
                if (!tot) return '';
                const ap = Math.round((av / tot) * 100);
                const bp = 100 - ap;
                return `
                  <div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:7px;font-size:0.88rem;">
                      <span style="font-weight:${ap >= bp ? 700 : 400};color:${ap >= bp ? 'var(--accent)' : 'var(--muted)'};">
                        ${q.a} <span style="font-size:0.78rem;">(${ap}%)</span>
                      </span>
                      <span style="font-weight:${bp > ap ? 700 : 400};color:${bp > ap ? 'var(--accent2)' : 'var(--muted)'};">
                        ${q.b} <span style="font-size:0.78rem;">(${bp}%)</span>
                      </span>
                    </div>
                    <div style="height:9px;border-radius:99px;overflow:hidden;display:flex;">
                      <div style="width:${ap}%;background:var(--accent);transition:width .6s ease;"></div>
                      <div style="flex:1;background:var(--accent2);"></div>
                    </div>
                  </div>
                `;
              }).filter(Boolean).join('')}
            </div>
          </div>
        ` : ''}

        <div class="fu3" style="width:100%;">
          <button class="btn btn-ghost btn-full" style="color:var(--danger);border-color:var(--danger);" onclick="clearAll()">
            Clear all participant data
          </button>
        </div>
      `}
    `;
  }

  function logout() {
    currentAdmin = null;
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('gate').classList.remove('hidden');
    document.getElementById('adminLabel').textContent = '';
    document.getElementById('un').value = '';
    document.getElementById('pw').value = '';
    document.getElementById('gateErr').classList.add('hidden');
  }

  function deleteUser(email) {
    if (!confirm(`Remove ${email} and all their responses? This cannot be undone.`)) return;
    const store = getStore();
    store.users = store.users.filter(u => u.email !== email);
    saveStore(store);
    renderDashboard();
  }

  function clearAll() {
    if (!confirm('Delete ALL participant data? This cannot be undone.')) return;
    localStorage.removeItem('quizlab_v2');
    renderDashboard();
  }

  function exportCSV() {
    const users = getStore().users || [];
    const rows  = [['Name', 'Email', 'MCQ Score', 'MCQ %', 'This or That Done', 'Joined']];
    users.forEach(u => {
      const t1 = u.test1;
      rows.push([
        u.name,
        u.email,
        t1 ? `${t1.score}/${t1.total}` : '',
        t1 ? Math.round((t1.score / t1.total) * 100) + '%' : '',
        u.test2 ? 'Yes' : 'No',
        fmtDate(u.joinedAt)
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
    const a   = document.createElement('a');
    a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'quizlab-results.csv';
    a.click();
  }
</script>
</body>
</html>
